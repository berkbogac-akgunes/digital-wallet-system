name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build & Test Backend
        working-directory: ./backend
        run: mvn clean test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: SSH & Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 13.62.99.211
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd digital-wallet-system
            git pull
            docker-compose down
            docker-compose up --build -d