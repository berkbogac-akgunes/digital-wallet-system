services:
  postgres:
    image: postgres:15
    container_name: wallet-db
    restart: always
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Kafka123
    ports:
      - "5432:5432"
    volumes:
      - digitalwallet_postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: wallet-backend
    restart: on-failure
    depends_on:
      - postgres
    environment:
        DB_USERNAME: postgres
        DB_PASSWORD: Kafka123
        JWT_SECRET: cok-uzun-ve-guvenli-bir-secret-key-1234567890
        SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/walletdb
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: wallet-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  digitalwallet_postgres_data: